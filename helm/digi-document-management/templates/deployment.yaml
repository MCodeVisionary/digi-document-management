apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "dm.name" . }}
  labels: {{- include "dm.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  strategy: { type: Recreate }
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ include "dm.name" . }}
  template:
    metadata:
      labels: {{- include "dm.labels" . | nindent 8 }}
    spec:
      imagePullSecrets: {{- toYaml .Values.imagePullSecrets | nindent 8 }}
      containers:
        - name: api
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports: [{ containerPort: {{ .Values.service.port }} }]
          volumeMounts:
            - name: data
              mountPath: {{ .Values.persistence.mountPath }}
          readinessProbe:
            httpGet: { path: /health, port: {{ .Values.service.port }} }
          livenessProbe:
            httpGet: { path: /health, port: {{ .Values.service.port }} }
          resources: {{- toYaml .Values.resources | nindent 12 }}
      volumes:
        - name: data
        {{- if .Values.persistence.enabled }}
          persistentVolumeClaim:
            claimName: {{ include "dm.name" . }}-data
        {{- else }}
          emptyDir: {}
        {{- end }}
