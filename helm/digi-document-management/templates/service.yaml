apiVersion: v1
kind: Service
metadata:
  name: {{ include "dm.name" . }}
  labels: {{- include "dm.labels" . | nindent 4 }}
spec:
  type: {{ .Values.service.type }}
  selector:
    app.kubernetes.io/name: {{ include "dm.name" . }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.service.port }}
