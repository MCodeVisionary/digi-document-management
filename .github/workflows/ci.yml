name: digi-document-management

on:
  push:
    branches: [ main ]
  workflow_dispatch:
    inputs:
      debug:
        description: 'Enable debug logging'
        type: boolean
        default: false

permissions:
  id-token: write
  contents: write

env:
  JF_URL: ${{ vars.JF_URL }}
  NUGET_REPO:   docportal-doc-management-nuget-dev-virtual
  DOCKER_REPO:       docportal-doc-management-docker-dev-virtual
  DOCKER_LOCAL_REPO: docportal-doc-management-docker-dev-local
  HELM_REPO:       docportal-doc-management-helm-dev-virtual
  HELM_LOCAL_REPO: docportal-doc-management-helm-dev-local
  GENERIC_REPO:       docportal-doc-management-generic-dev-virtual
  GENERIC_LOCAL_REPO: docportal-doc-management-generic-dev-local
  APP_KEY:      docportal
  PROJECT_KEY:  docportal
  IMAGE_NAME:   digi-document-management
  EVIDENCE_KEY_ALIAS: docportal-evidence-key

jobs:
  build-test-publish:
    runs-on: ubuntu-latest
    env:
      JFROG_CLI_LOG_LEVEL:          ${{ inputs.debug && 'DEBUG' || 'INFO' }}
      DOTNET_VERBOSITY:             ${{ inputs.debug && 'diagnostic' || 'minimal' }}
      Logging__LogLevel__Default:   ${{ inputs.debug && 'Debug' || 'Information' }}
      JFROG_CLI_BUILD_PROJECT:      docportal
    steps:
      - uses: actions/checkout@v5

      - name: Set version from file
        run: echo "VERSION=$(cat VERSION)" >> $GITHUB_ENV

      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '8.0.x'

      - name: Remove .NET 9 and 10 SDKs (JFrog CLI must use .NET 8 MSBuild)
        run: sudo rm -rf /usr/share/dotnet/sdk/9.0.* /usr/share/dotnet/sdk/10.0.*

      - name: Setup JFrog CLI (OIDC)
        uses: jfrog/setup-jfrog-cli@v4
        with:
          version: latest
          oidc-provider-name: github-docportal
          disable-auto-build-publish: true
        env:
          JF_URL: ${{ env.JF_URL }}

      - name: Verify JFrog connectivity (OIDC health check)
        run: jf rt ping

      - name: Ensure lifecycle environments have repositories
        continue-on-error: true
        run: |
          create_or_update() {
            local NAME=$1 REPOS=$2
            local PAYLOAD="{\"name\":\"${NAME}\",\"repository_keys\":${REPOS}}"
            local HTTP=$(jf rt curl -s -w "\n%{http_code}" -o /tmp/lc.json \
              -X POST "api/lifecycle/environments" \
              -H "Content-Type: application/json" -d "$PAYLOAD" 2>&1 | tail -1)
            cat /tmp/lc.json 2>/dev/null; echo "→ $NAME POST $HTTP"
            if [ "$HTTP" = "409" ]; then
              jf rt curl -s -X PUT "api/lifecycle/environments/${NAME}" \
                -H "Content-Type: application/json" -d "$PAYLOAD" 2>&1
              echo "→ $NAME PUT done"
            fi
          }
          create_or_update DEV     '["docportal-client-portal-docker-dev-local","docportal-client-portal-generic-dev-local","docportal-client-portal-helm-dev-local","docportal-client-portal-npm-dev-local","docportal-client-portal-pypi-dev-local","docportal-doc-converter-docker-dev-local","docportal-doc-converter-generic-dev-local","docportal-doc-converter-helm-dev-local","docportal-doc-converter-nuget-dev-local","docportal-doc-management-docker-dev-local","docportal-doc-management-generic-dev-local","docportal-doc-management-helm-dev-local","docportal-doc-management-nuget-dev-local"]'
          create_or_update QA      '["docportal-client-portal-docker-qa-local","docportal-client-portal-helm-qa-local","docportal-client-portal-npm-qa-local","docportal-client-portal-pypi-qa-local","docportal-doc-converter-docker-qa-local","docportal-doc-converter-helm-qa-local","docportal-doc-converter-nuget-qa-local","docportal-doc-management-docker-qa-local","docportal-doc-management-helm-qa-local","docportal-doc-management-nuget-qa-local"]'
          create_or_update STAGING '["docportal-client-portal-docker-staging-local","docportal-client-portal-helm-staging-local","docportal-client-portal-npm-staging-local","docportal-client-portal-pypi-staging-local","docportal-doc-converter-docker-staging-local","docportal-doc-converter-helm-staging-local","docportal-doc-converter-nuget-staging-local","docportal-doc-management-docker-staging-local","docportal-doc-management-helm-staging-local","docportal-doc-management-nuget-staging-local"]'
          create_or_update PROD    '["docportal-client-portal-docker-prod-local","docportal-client-portal-helm-prod-local","docportal-client-portal-npm-prod-local","docportal-client-portal-pypi-prod-local","docportal-doc-converter-docker-prod-local","docportal-doc-converter-helm-prod-local","docportal-doc-converter-nuget-prod-local","docportal-doc-management-docker-prod-local","docportal-doc-management-helm-prod-local","docportal-doc-management-nuget-prod-local"]'

      - name: Curation audit — nuget
        continue-on-error: true
        run: |
          jf nugetc --repo-resolve "$NUGET_REPO" --server-id-resolve "$SETUP_JFROG_CLI_SERVER_IDS"
          jf ca

      # ---------------------------------------------------------------
      # BUILD  (restore + compile; tests run per-stage below)
      # ---------------------------------------------------------------
      - name: Restore & build
        run: |
          dotnet nuget locals all --clear
          jf dotnetc --repo-resolve "$NUGET_REPO" --server-id-resolve "$SETUP_JFROG_CLI_SERVER_IDS"
          jf dotnet restore --build-name "$IMAGE_NAME" --build-number "${{ github.run_number }}"
          dotnet build -c Release --no-restore --verbosity "$DOTNET_VERBOSITY"

      - name: Commit NuGet lockfiles if generated
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add **/packages.lock.json
          git diff --staged --quiet || (git commit -m "chore: update NuGet lockfiles [skip ci]" && git push)

      - name: Security audit — nuget
        continue-on-error: true
        run: |
          jf dotnetc --repo-resolve "$NUGET_REPO" --server-id-resolve "$SETUP_JFROG_CLI_SERVER_IDS"
          jf audit --nuget

      - name: Generate SonarQube evidence (validation)
        run: bash .github/scripts/generate-dummy-sonarqube-evidence.sh

      # ---------------------------------------------------------------
      # PUBLISH ARTIFACTS to JFrog  (docker, helm)
      # ---------------------------------------------------------------
      - name: Docker login to JFrog registry
        run: jf docker login "${JF_URL#https://}"

      - name: Build & push Docker image
        run: |
          jf docker build -t "${JF_URL#https://}/$DOCKER_REPO/$IMAGE_NAME:$VERSION" .
          jf docker scan "${JF_URL#https://}/$DOCKER_REPO/$IMAGE_NAME:$VERSION"
          jf docker push "${JF_URL#https://}/$DOCKER_REPO/$IMAGE_NAME:$VERSION" \
            --build-name "$IMAGE_NAME" --build-number "${{ github.run_number }}"

      - name: Provenance — Docker image
        run: |
          cat > provenance-docker.json <<JSON
          { "buildDefinition": {
              "buildType": "https://slsa.dev/github-actions-workflow/v1",
              "externalParameters": { "workflow": { "repository": "https://github.com/${{ github.repository }}", "ref": "${{ github.ref }}", "path": ".github/workflows/ci.yml" } },
              "resolvedDependencies": [{ "uri": "git+https://github.com/${{ github.repository }}@${{ github.ref }}", "digest": { "gitCommit": "${{ github.sha }}" } }] },
            "runDetails": { "builder": { "id": "https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}" },
              "metadata": { "invocationId": "https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}" } } }
          JSON
          jf evd create \
            --package-name "$IMAGE_NAME" --package-version "$VERSION" \
            --package-repo-name "$DOCKER_LOCAL_REPO" \
            --predicate "provenance-docker.json" \
            --predicate-type "https://slsa.dev/provenance/v1" \
            --provider-id github \
            --key "${{ secrets.EVIDENCE_PRIVATE_KEY }}" --key-alias "$EVIDENCE_KEY_ALIAS"

      - name: Package & push Helm chart
        run: |
          helm package helm/digi-document-management --version "$VERSION" --app-version "$VERSION"
          jf rt upload "digi-document-management-${VERSION}.tgz" "$HELM_LOCAL_REPO/" \
            --build-name "$IMAGE_NAME" --build-number "${{ github.run_number }}" \
            --module "$IMAGE_NAME-helm"

      - name: Provenance — Helm chart
        run: |
          cat > provenance-helm.json <<JSON
          { "buildDefinition": {
              "buildType": "https://slsa.dev/github-actions-workflow/v1",
              "externalParameters": { "workflow": { "repository": "https://github.com/${{ github.repository }}", "ref": "${{ github.ref }}", "path": ".github/workflows/ci.yml" } },
              "resolvedDependencies": [{ "uri": "git+https://github.com/${{ github.repository }}@${{ github.ref }}", "digest": { "gitCommit": "${{ github.sha }}" } }] },
            "runDetails": { "builder": { "id": "https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}" },
              "metadata": { "invocationId": "https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}" } } }
          JSON
          jf evd create \
            --package-name "$IMAGE_NAME" --package-version "$VERSION" \
            --package-repo-name "$HELM_LOCAL_REPO" \
            --predicate "provenance-helm.json" \
            --predicate-type "https://slsa.dev/provenance/v1" \
            --provider-id github \
            --key "${{ secrets.EVIDENCE_PRIVATE_KEY }}" --key-alias "$EVIDENCE_KEY_ALIAS"

      # ---------------------------------------------------------------
      # EVIDENCE — CodeQL static analysis
      # ---------------------------------------------------------------
      - name: Generate CodeQL evidence files (C#)
        run: bash .github/scripts/generate-dummy-codeql-evidence.sh

      - name: Collect build environment
        run: jf rt build-collect-env "$IMAGE_NAME" "${{ github.run_number }}" --project "$PROJECT_KEY"

      - name: Publish build-info
        run: jf rt build-publish "$IMAGE_NAME" "${{ github.run_number }}" --project "$PROJECT_KEY"

      - name: Xray scan (wait for completion)
        run: |
          OUTPUT=$(jf build-scan "$IMAGE_NAME" "${{ github.run_number }}" --project "$PROJECT_KEY" 2>&1) && RC=0 || RC=$?
          echo "$OUTPUT"
          sleep 30
          # RC=3 means scan completed but Xray found policy violations — non-blocking
          if [ $RC -ne 0 ] && [ $RC -ne 3 ]; then exit $RC; fi

      # ---------------------------------------------------------------
      # EVIDENCE — SLSA provenance + build signature (build-level)
      # ---------------------------------------------------------------
      - name: Evidence — SLSA provenance (on build)
        run: |
          cat > provenance.json <<JSON
          { "buildDefinition": {
              "buildType": "https://slsa.dev/github-actions-workflow/v1",
              "externalParameters": { "workflow": { "repository": "https://github.com/${{ github.repository }}", "ref": "${{ github.ref }}", "path": ".github/workflows/ci.yml" } },
              "resolvedDependencies": [{ "uri": "git+https://github.com/${{ github.repository }}@${{ github.ref }}", "digest": { "gitCommit": "${{ github.sha }}" } }] },
            "runDetails": { "builder": { "id": "https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}" },
              "metadata": { "invocationId": "https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}" } } }
          JSON
          jf evd create --build-name "$IMAGE_NAME" --build-number "${{ github.run_number }}" \
            --project "$PROJECT_KEY" \
            --predicate provenance.json --predicate-type "https://slsa.dev/provenance/v1" \
            --key "${{ secrets.EVIDENCE_PRIVATE_KEY }}" --key-alias "$EVIDENCE_KEY_ALIAS"

      - name: Evidence — build signature
        run: |
          echo "{ \"actor\": \"${{ github.actor }}\", \"date\": \"$(date -u +%Y-%m-%dT%H:%M:%SZ)\" }" > build-sig.json
          jf evd create --build-name "$IMAGE_NAME" --build-number "${{ github.run_number }}" \
            --project "$PROJECT_KEY" \
            --predicate build-sig.json --predicate-type "https://jfrog.com/evidence/build-signature/v1" \
            --key "${{ secrets.EVIDENCE_PRIVATE_KEY }}" --key-alias "$EVIDENCE_KEY_ALIAS"

      - name: Evidence — SonarQube quality gate (build)
        run: |
          jf evd create \
            --build-name "$IMAGE_NAME" --build-number "${{ github.run_number }}" \
            --project "$PROJECT_KEY" \
            --predicate .jfrog/evidence/sonarqube-coverage.json \
            --markdown .jfrog/evidence/sonarqube-coverage.md \
            --predicate-type "https://jfrog.com/evidence/sonarqube/v1" \
            --provider-id sonar \
            --key "${{ secrets.EVIDENCE_PRIVATE_KEY }}" --key-alias "$EVIDENCE_KEY_ALIAS"

      - name: Evidence — CodeQL static analysis (build)
        run: |
          printf '%s\n' "${{ secrets.EVIDENCE_PRIVATE_KEY }}" > evidence_private_key.pem
          chmod 600 evidence_private_key.pem
          jf evd create \
            --build-name "$IMAGE_NAME" --build-number "${{ github.run_number }}" \
            --project "$PROJECT_KEY" \
            --predicate results-csharp/csharp.sarif \
            --predicate-type "http://github.com/CodeQL/static-analysis" \
            --provider-id "github" \
            --markdown results-csharp/csharp-report.md \
            --key "$(cat evidence_private_key.pem)" --key-alias "$EVIDENCE_KEY_ALIAS"
          rm -f evidence_private_key.pem

      # ═══════════════════════════════════════════════════════════════
      # DEV STAGE — unit tests gate DEV → QA promotion
      # ═══════════════════════════════════════════════════════════════
      - name: "[DEV] Unit tests (dotnet)"
        run: |
          mkdir -p reports
          dotnet test tests/DigiDocumentManagement.UnitTests \
            --logger "trx;LogFileName=unit.trx" \
            --results-directory reports \
            --collect "XPlat Code Coverage" \
            --verbosity "$DOTNET_VERBOSITY"

      - name: "[DEV] Assemble unit-test predicate"
        run: |
          python3 - <<'PYEOF'
          import json, xml.etree.ElementTree as ET, os, datetime

          def parse_trx(path):
              try:
                  root = ET.parse(path).getroot()
                  ns = {'t': 'http://microsoft.com/schemas/VisualStudio/TeamTest/2010'}
                  c = root.find('.//t:Counters', ns)
                  if c is not None:
                      total  = int(c.get('total', 0))
                      passed = int(c.get('passed', 0))
                      failed = int(c.get('failed', 0))
                      return {'total':total,'passed':passed,'failed':failed,'ok':failed==0}
              except Exception as e:
                  return {'total':0,'passed':0,'failed':0,'ok':False,'error':str(e)}
              return {'total':0,'passed':0,'failed':0,'ok':False}

          unit = parse_trx('reports/unit.trx')
          overall = 'PASSED' if unit['ok'] else 'FAILED'
          predicate = {
              'name': 'digi-document-management unit test results',
              'stage': 'DEV',
              'result': overall,
              'build': os.environ['VERSION'],
              'suites': {
                  'unit': {'tool':'xunit','passed':unit['passed'],'failed':unit['failed'],'total':unit['total']},
              },
              'timestamp': datetime.datetime.utcnow().isoformat() + 'Z',
          }
          with open('reports/unit-predicate.json','w') as f:
              json.dump(predicate, f, indent=2)
          print(json.dumps(predicate, indent=2))
          if overall == 'FAILED':
              raise SystemExit(1)
          PYEOF

      - name: "[DEV] Evidence — unit test results (build)"
        run: |
          jf evd create \
            --build-name "$IMAGE_NAME" --build-number "${{ github.run_number }}" \
            --project "$PROJECT_KEY" \
            --predicate reports/unit-predicate.json \
            --predicate-type "https://jfrog.com/evidence/testing-results/v1" \
            --key "${{ secrets.EVIDENCE_PRIVATE_KEY }}" --key-alias "$EVIDENCE_KEY_ALIAS"

      - name: Create release bundle
        run: |
          OUTPUT=$(jf release-bundle-create "$IMAGE_NAME" "$VERSION" \
            --source-type-builds "name=$IMAGE_NAME, id=${{ github.run_number }}" \
            --project "$PROJECT_KEY" 2>&1) && RC=0 || RC=$?
          echo "$OUTPUT"
          if echo "$OUTPUT" | grep -q "already exists"; then
            echo "Release bundle $IMAGE_NAME/$VERSION already exists — skipping"
          elif [ $RC -ne 0 ]; then
            exit $RC
          fi

      - name: Promote release bundle → DEV
        run: |
          OUTPUT=$(jf release-bundle-promote "$IMAGE_NAME" "$VERSION" DEV --project "$PROJECT_KEY" 2>&1) && RC=0 || RC=$?
          echo "$OUTPUT"
          if echo "$OUTPUT" | grep -qi "already\|409"; then echo "already at DEV"
          elif [ $RC -ne 0 ]; then exit $RC; fi

      # ═══════════════════════════════════════════════════════════════
      # QA STAGE — functional/integration tests gate QA → STAGING
      # ═══════════════════════════════════════════════════════════════
      - name: "[QA] Functional tests (dotnet WebApplicationFactory)"
        run: |
          dotnet test tests/DigiDocumentManagement.FunctionalTests \
            --logger "trx;LogFileName=functional.trx" \
            --results-directory reports \
            --verbosity "$DOTNET_VERBOSITY"

      - name: "[QA] Assemble functional-test predicate"
        run: |
          python3 - <<'PYEOF'
          import json, xml.etree.ElementTree as ET, os, datetime

          def parse_trx(path):
              try:
                  root = ET.parse(path).getroot()
                  ns = {'t': 'http://microsoft.com/schemas/VisualStudio/TeamTest/2010'}
                  c = root.find('.//t:Counters', ns)
                  if c is not None:
                      total  = int(c.get('total', 0))
                      passed = int(c.get('passed', 0))
                      failed = int(c.get('failed', 0))
                      return {'total':total,'passed':passed,'failed':failed,'ok':failed==0}
              except Exception as e:
                  return {'total':0,'passed':0,'failed':0,'ok':False,'error':str(e)}
              return {'total':0,'passed':0,'failed':0,'ok':False}

          func = parse_trx('reports/functional.trx')
          overall = 'PASSED' if func['ok'] else 'FAILED'
          predicate = {
              'name': 'digi-document-management functional test results',
              'stage': 'QA',
              'result': overall,
              'build': os.environ['VERSION'],
              'suites': {
                  'functional': {'tool':'xunit+WebApplicationFactory','passed':func['passed'],'failed':func['failed'],'total':func['total']},
              },
              'timestamp': datetime.datetime.utcnow().isoformat() + 'Z',
          }
          with open('reports/functional-predicate.json','w') as f:
              json.dump(predicate, f, indent=2)
          print(json.dumps(predicate, indent=2))
          if overall == 'FAILED':
              raise SystemExit(1)
          PYEOF

      - name: "[QA] Evidence — functional test results (build)"
        run: |
          jf evd create \
            --build-name "$IMAGE_NAME" --build-number "${{ github.run_number }}" \
            --project "$PROJECT_KEY" \
            --predicate reports/functional-predicate.json \
            --predicate-type "https://jfrog.com/evidence/integration-results/v1" \
            --key "${{ secrets.EVIDENCE_PRIVATE_KEY }}" --key-alias "$EVIDENCE_KEY_ALIAS"

      - name: Promote release bundle → QA
        run: |
          OUTPUT=$(jf release-bundle-promote "$IMAGE_NAME" "$VERSION" QA --project "$PROJECT_KEY" 2>&1) && RC=0 || RC=$?
          echo "$OUTPUT"
          if echo "$OUTPUT" | grep -qi "already\|409"; then echo "already at QA"
          elif [ $RC -ne 0 ]; then exit $RC; fi

      # ═══════════════════════════════════════════════════════════════
      # STAGING STAGE — k6 performance tests gate STAGING → PROD
      # ═══════════════════════════════════════════════════════════════
      - name: "[STAGING] Install k6"
        run: |
          K6_VER=v0.55.0
          curl -fsSL "https://github.com/grafana/k6/releases/download/${K6_VER}/k6-${K6_VER}-linux-amd64.tar.gz" \
            -o /tmp/k6.tar.gz
          tar -xzf /tmp/k6.tar.gz -C /tmp
          sudo mv "/tmp/k6-${K6_VER}-linux-amd64/k6" /usr/local/bin/k6
          k6 version

      - name: "[STAGING] Performance test — k6 (real)"
        run: |
          mkdir -p reports
          # Start the service using the already-compiled binary
          dotnet run --project src/DigiDocumentManagement -c Release --no-build \
            --urls http://127.0.0.1:8765 &
          SVC_PID=$!
          # Wait up to 30 s for the HTTP server to accept connections
          for i in $(seq 1 30); do
            curl -s http://127.0.0.1:8765/ >/dev/null 2>&1 && echo "Service ready after ${i}s" && break || sleep 1
          done
          # Run k6: 5 VUs, 20 seconds
          PERF_BASE_URL=http://127.0.0.1:8765 VUS=5 DURATION=20s \
            k6 run tests/performance/load-test.js \
            --summary-export reports/k6-summary.json 2>&1 || true
          kill $SVC_PID 2>/dev/null || true
          ls reports/k6-summary.json 2>/dev/null || echo "No k6 summary output"

      - name: "[STAGING] Assemble performance predicate"
        run: |
          python3 - <<'PYEOF'
          import json, os, datetime

          def parse_k6(path, perf_out):
              result = {'total_requests':0,'failure_rate':0.0,'p95_ms':0.0,'passed':False}
              try:
                  with open(path) as f:
                      d = json.load(f)
                  m = d.get('metrics', {})
                  p95       = m.get('http_req_duration', {}).get('values', {}).get('p(95)', 0)
                  fail_rate = m.get('http_req_failed',   {}).get('values', {}).get('rate', 0)
                  total     = int(m.get('http_reqs',     {}).get('values', {}).get('count', 0))
                  result = {
                      'total_requests': total,
                      'failure_rate':   round(fail_rate, 4),
                      'p95_ms':         round(p95, 1),
                      'passed':         fail_rate < 0.01 and p95 < 300,
                  }
              except Exception as e:
                  result['error'] = str(e)
              with open(perf_out, 'w') as f:
                  json.dump(result, f, indent=2)
              return result

          perf = parse_k6('reports/k6-summary.json', 'reports/performance.json')
          overall = 'PASSED' if perf['passed'] else 'FAILED'
          predicate = {
              'name': 'digi-document-management performance test results',
              'stage': 'STAGING',
              'result': overall,
              'build': os.environ['VERSION'],
              'suites': {
                  'performance': {'tool':'k6','total_requests':perf['total_requests'],
                                  'p95_ms':perf['p95_ms'],'failure_rate':perf['failure_rate'],
                                  'passed':perf['passed']},
              },
              'timestamp': datetime.datetime.utcnow().isoformat() + 'Z',
          }
          with open('reports/perf-predicate.json','w') as f:
              json.dump(predicate, f, indent=2)
          print(json.dumps(predicate, indent=2))
          if overall == 'FAILED':
              raise SystemExit(1)
          PYEOF

      - name: "[STAGING] Evidence — performance test results (build)"
        run: |
          jf evd create \
            --build-name "$IMAGE_NAME" --build-number "${{ github.run_number }}" \
            --project "$PROJECT_KEY" \
            --predicate reports/perf-predicate.json \
            --predicate-type "https://jfrog.com/evidence/performance-results/v1" \
            --attach-local reports/performance.json \
            --attach-artifactory-temp-path "$GENERIC_LOCAL_REPO/$IMAGE_NAME/${{ github.run_number }}/evidence-temp" \
            --key "${{ secrets.EVIDENCE_PRIVATE_KEY }}" --key-alias "$EVIDENCE_KEY_ALIAS"

      - name: Promote release bundle → STAGING
        run: |
          OUTPUT=$(jf release-bundle-promote "$IMAGE_NAME" "$VERSION" STAGING --project "$PROJECT_KEY" 2>&1) && RC=0 || RC=$?
          echo "$OUTPUT"
          if echo "$OUTPUT" | grep -qi "already\|409"; then echo "already at STAGING"
          elif [ $RC -ne 0 ]; then exit $RC; fi

      # ═══════════════════════════════════════════════════════════════
      # PROD STAGE
      # ═══════════════════════════════════════════════════════════════
      - name: Promote release bundle → PROD
        run: |
          OUTPUT=$(jf release-bundle-promote "$IMAGE_NAME" "$VERSION" PROD --project "$PROJECT_KEY" 2>&1) && RC=0 || RC=$?
          echo "$OUTPUT"
          if echo "$OUTPUT" | grep -qi "already\|409"; then echo "already at PROD"
          elif [ $RC -ne 0 ]; then exit $RC; fi

      # ---------------------------------------------------------------
      # POST-PROD — upload reports, bundle evidence, AppTrust, version bump
      # ---------------------------------------------------------------
      - name: Upload test reports
        run: |
          jf rt upload "reports/*" "$GENERIC_LOCAL_REPO/$IMAGE_NAME/${{ github.run_number }}/reports/" \
            --flat=false

      - name: Evidence — test results (release bundle)
        run: |
          jf evd create \
            --release-bundle "$IMAGE_NAME" --release-bundle-version "$VERSION" \
            --project "$PROJECT_KEY" \
            --predicate reports/unit-predicate.json \
            --predicate-type "https://jfrog.com/evidence/testing-results/v1" \
            --key "${{ secrets.EVIDENCE_PRIVATE_KEY }}" --key-alias "$EVIDENCE_KEY_ALIAS"

      - name: AppTrust — register application version
        run: |
          OUTPUT=$(jf apptrust app-create "$APP_KEY" \
            --application-name "DocPortal" --project "$PROJECT_KEY" 2>&1) && RC=0 || RC=$?
          if echo "$OUTPUT" | grep -q "already exists"; then
            echo "AppTrust application $APP_KEY already exists"
          elif [ $RC -ne 0 ]; then exit $RC; fi

          OUTPUT=$(jf apptrust version-create "$APP_KEY" "$VERSION-${{ github.run_number }}" \
            --source-type-builds "name=$IMAGE_NAME, id=${{ github.run_number }}" \
            --tag "$IMAGE_NAME" 2>&1) && RC=0 || RC=$?
          if echo "$OUTPUT" | grep -qi "already exists"; then
            echo "AppTrust version $VERSION-${{ github.run_number }} already exists"
          elif [ $RC -ne 0 ]; then
            echo "Warning: AppTrust version-create failed — $OUTPUT"
          fi

          echo "{ \"service\": \"$IMAGE_NAME\", \"version\": \"$VERSION\", \"actor\": \"${{ github.actor }}\", \"date\": \"$(date -u +%Y-%m-%dT%H:%M:%SZ)\" }" > app-release.json
          jf evd create \
            --release-bundle "$IMAGE_NAME" --release-bundle-version "$VERSION" \
            --application-key "$APP_KEY" --application-version "$VERSION-${{ github.run_number }}" \
            --project "$PROJECT_KEY" \
            --predicate app-release.json \
            --predicate-type "https://jfrog.com/evidence/release-notes/v1" \
            --key "${{ secrets.EVIDENCE_PRIVATE_KEY }}" --key-alias "$EVIDENCE_KEY_ALIAS"

          OUTPUT=$(jf apptrust version-release "$APP_KEY" "$VERSION-${{ github.run_number }}" \
            --sync true 2>&1) && RC=0 || RC=$?
          if echo "$OUTPUT" | grep -qi "already\|409"; then
            echo "AppTrust version already released"
          elif [ $RC -ne 0 ]; then
            echo "Warning: AppTrust version-release failed — $OUTPUT"
          fi

      - name: Bump patch version
        if: success()
        run: |
          CURRENT=$(cat VERSION)
          NEW=$(echo "$CURRENT" | awk -F. -v OFS=. '{$NF = $NF + 1; print}')
          echo "$NEW" > VERSION
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add VERSION
          git commit -m "chore: bump version to $NEW [skip ci]"
          git push
