name: "Frogbot Scan Pull Request"

on:
  pull_request_target:
    types: [ opened, synchronize ]

permissions:
  pull-requests: write
  contents: read
  id-token: write

jobs:
  scan-pull-request:
    runs-on: ubuntu-latest
    # PRs must be approved by a member of the 'frogbot' GitHub environment
    # before Frogbot scans them (protects against malicious PRs).
    environment: frogbot
    steps:
      - uses: jfrog/frogbot@v3
        env:
          # JFrog platform URL
          JF_URL: ${{ vars.JF_URL }}

          # OIDC authentication — no static token needed
          JF_OPENID_CONNECT_PROVIDER_NAME: github-docportal

          # GitHub token — automatically generated for the job
          JF_GIT_TOKEN: ${{ secrets.GITHUB_TOKEN }}

          # Use Config Profiles configured in the JFrog Platform UI
          JF_USE_CONFIG_PROFILE: "true"

          # Scope all scans to the docportal project
          JF_PROJECT: docportal

          # NuGet/.NET Core requires an explicit restore command
          JF_INSTALL_DEPS_CMD: "dotnet restore"

          # Log level — uncomment to enable debug output
          # JFROG_CLI_LOG_LEVEL: DEBUG
